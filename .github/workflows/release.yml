name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify plugin.json version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "plugin.json version ($MANIFEST_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi
      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          python3 - <<'PY' > release-notes.md
          import re, sys
          version = "${{ steps.version.outputs.version }}"
          text = open("CHANGELOG.md").read()
          pattern = rf"## \[{re.escape(version)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL | re.MULTILINE)
          if match:
              sys.stdout.write(match.group(0).strip())
          else:
              sys.stdout.write(f"No CHANGELOG entry found for {version}.")
          PY
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
